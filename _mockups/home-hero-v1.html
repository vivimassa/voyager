<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Voyager — Discover Vietnam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #0ea55f;
      --cta: #1d4ed8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #0a0a0a; color: #fff; font-family: 'Inter', system-ui, sans-serif; }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center;
      transition: opacity 0.9s ease;
      opacity: 0;
      will-change: opacity;
    }
    .hero-bg.active { opacity: 1; animation: kenburns 14s ease-in-out forwards; }
    @keyframes kenburns {
      0% { transform: scale(1); }
      100% { transform: scale(1.08); }
    }

    .overlay {
      position: absolute; inset: 0;
      background:
        linear-gradient(105deg, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.35) 35%, rgba(0,0,0,0.08) 60%, rgba(0,0,0,0) 80%),
        linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0) 25%, rgba(0,0,0,0) 70%, rgba(0,0,0,0.35) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .nav {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 48px;
      z-index: 10;
    }
    .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .logo-mark {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--accent);
      display: grid; place-items: center;
      color: #fff; font-family: 'Fraunces', serif; font-weight: 700; font-size: 20px;
    }
    .logo-text { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }

    .nav-links { display: flex; gap: 40px; font-size: 14px; font-weight: 500; }
    .nav-links a { color: rgba(255,255,255,0.85); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: #fff; }

    .nav-actions { display: flex; align-items: center; gap: 14px; }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.14); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.22);
      display: grid; place-items: center;
      color: #fff; cursor: pointer; font-size: 15px;
    }
    .login-btn {
      padding: 10px 22px; border-radius: 24px;
      background: rgba(255,255,255,0.14); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.22);
      color: #fff; font-size: 14px; font-weight: 500; cursor: pointer;
      font-family: inherit;
    }
    .signup-btn {
      padding: 10px 22px; border-radius: 24px;
      background: var(--accent); border: none;
      color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .signup-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(14,165,95,0.4); }

    .hero-content {
      position: absolute;
      bottom: 0; left: 0;
      padding: 0 48px 130px 48px;
      max-width: 720px;
      z-index: 5;
    }
    .counter-top {
      font-family: 'Fraunces', serif;
      font-size: 13px; letter-spacing: 0.12em;
      color: rgba(255,255,255,0.75);
      margin-bottom: 28px;
      border-top: 1px solid rgba(255,255,255,0.35);
      padding-top: 16px;
      width: 70px;
    }
    .hero-title {
      font-family: 'Fraunces', serif;
      font-size: clamp(64px, 11vw, 160px);
      font-weight: 700;
      line-height: 0.88;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      margin-bottom: 28px;
      text-shadow: 0 4px 28px rgba(0,0,0,0.35);
    }
    .hero-description {
      font-size: 16px;
      line-height: 1.65;
      color: rgba(255,255,255,0.9);
      max-width: 520px;
      margin-bottom: 36px;
    }
    .explore-btn {
      display: inline-flex; align-items: center; gap: 14px;
      padding: 16px 34px; border-radius: 100px;
      background: var(--cta); border: none;
      color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
      box-shadow: 0 12px 40px rgba(29,78,216,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .explore-btn:hover { transform: translateY(-2px); box-shadow: 0 16px 48px rgba(29,78,216,0.55); }
    .explore-btn .arrow { transition: transform 0.2s; display: inline-block; }
    .explore-btn:hover .arrow { transform: translateX(4px); }

    .cards {
      position: absolute;
      right: 48px; top: 50%;
      transform: translateY(-50%);
      display: flex; gap: 16px;
      z-index: 5;
    }
    .card {
      width: 200px; height: 280px;
      border-radius: 18px;
      background-size: cover; background-position: center;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
      transition: transform 0.4s ease, box-shadow 0.4s;
      flex-shrink: 0;
      background-color: #222;
    }
    .card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 40%, rgba(0,0,0,0.7) 100%);
    }
    .card:hover { transform: translateY(-8px); box-shadow: 0 20px 50px rgba(0,0,0,0.45); }
    .card-top {
      position: absolute; top: 16px; left: 16px; right: 16px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 2;
    }
    .card-name {
      font-size: 11px; font-weight: 600; letter-spacing: 0.18em;
      color: rgba(255,255,255,0.95);
    }
    .card-save {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,0.25); backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: grid; place-items: center;
      color: #fff; font-size: 13px;
    }
    .card-bottom {
      position: absolute; bottom: 16px; left: 16px; right: 16px;
      z-index: 2;
    }
    .card-stars {
      font-size: 9px; letter-spacing: 0.3em; margin-bottom: 6px;
      color: rgba(255,255,255,0.9);
    }
    .card-price { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; color: #fff; }
    .card-price .from { font-size: 11px; font-weight: 400; font-family: 'Inter', sans-serif; color: rgba(255,255,255,0.75); }

    .controls {
      position: absolute;
      bottom: 52px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 12px;
      z-index: 5;
    }
    .arrow-btn {
      width: 46px; height: 46px; border-radius: 50%;
      background: rgba(255,255,255,0.14); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.22);
      display: grid; place-items: center;
      color: #fff; cursor: pointer;
      font-size: 18px;
      transition: background 0.2s;
      font-family: inherit;
    }
    .arrow-btn:hover { background: rgba(255,255,255,0.28); }

    .counter {
      position: absolute;
      bottom: 54px; right: 48px;
      font-family: 'Fraunces', serif;
      color: rgba(255,255,255,0.9);
      z-index: 5;
      display: flex; align-items: baseline; gap: 2px;
    }
    .counter .current { font-size: 30px; font-weight: 700; line-height: 1; }
    .counter .divider { font-size: 16px; opacity: 0.5; }

    .scroll-hint {
      position: absolute;
      bottom: 28px; left: 48px;
      font-size: 11px; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      z-index: 5;
    }

    @media (max-width: 1280px) {
      .cards .card:nth-child(n+3) { display: none; }
    }
    @media (max-width: 960px) {
      .nav-links { display: none; }
      .hero-title { font-size: 72px; }
      .hero-content { padding: 0 24px 140px 24px; }
      .cards { display: none; }
      .nav { padding: 18px 24px; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="hero-bg" data-idx="0"></div>
    <div class="hero-bg" data-idx="1"></div>
    <div class="hero-bg" data-idx="2"></div>
    <div class="hero-bg" data-idx="3"></div>
    <div class="hero-bg" data-idx="4"></div>
    <div class="overlay"></div>

    <nav class="nav">
      <div class="logo">
        <div class="logo-mark">V</div>
        <div class="logo-text">Voyager</div>
      </div>
      <div class="nav-links">
        <a href="#">Destinations</a>
        <a href="#">Airport services</a>
        <a href="#">Travel guides</a>
        <a href="#">About</a>
      </div>
      <div class="nav-actions">
        <div class="icon-btn" title="EN / VI">EN</div>
        <button class="login-btn">Log in</button>
        <button class="signup-btn">Sign up</button>
      </div>
    </nav>

    <div class="hero-content">
      <div class="counter-top" id="counter-top">01 / 05</div>
      <h1 class="hero-title" id="hero-title">HA LONG</h1>
      <p class="hero-description" id="hero-desc"></p>
      <button class="explore-btn" id="explore-btn">
        Explore <span class="arrow">&rarr;</span>
      </button>
    </div>

    <div class="cards" id="cards"></div>

    <div class="controls">
      <button class="arrow-btn" id="prev-btn" aria-label="Previous">&lsaquo;</button>
      <button class="arrow-btn" id="next-btn" aria-label="Next">&rsaquo;</button>
    </div>

    <div class="counter"><span class="current" id="counter-num">01</span><span class="divider">&nbsp;/ 05</span></div>

    <div class="scroll-hint">Scroll for airport services &darr;</div>
  </div>

  <script>
    const DESTINATIONS = [
      {
        name: 'HA LONG',
        description: "Ha Long Bay's 1,600 limestone islands rise from emerald waters like a scene from another world. Cruise through floating villages, kayak into hidden caves, and wake up to mist-draped karsts on an overnight junk boat.",
        price: '1,850,000',
        stars: 5,
        photo: 'https://images.unsplash.com/photo-1528127269322-539801943592?auto=format&fit=crop&w=2400&q=80',
      },
      {
        name: 'SAPA',
        description: "Emerald rice terraces spiral down the slopes of Fansipan, threaded with villages where the Hmong and Dao have lived for centuries. Trek through ancestor paths, stay with a homestay family, and watch fog roll off the valleys at dawn.",
        price: '1,420,000',
        stars: 4,
        photo: 'https://images.unsplash.com/photo-1555921015-5532091f6026?auto=format&fit=crop&w=2400&q=80',
      },
      {
        name: 'HOI AN',
        description: "A UNESCO old town where yellow-washed merchant houses meet lantern-lit streets and the scent of lemongrass drifts from every doorway. Sail a wooden boat at dusk, tailor a silk ao dai by morning, eat the best banh mi of your life.",
        price: '1,100,000',
        stars: 5,
        photo: 'https://images.unsplash.com/photo-1559592413-7cec4d0cae2b?auto=format&fit=crop&w=2400&q=80',
      },
      {
        name: 'MEKONG',
        description: "Glide past floating markets and fruit orchards where nine dragons of the Mekong reach the sea. Wake before dawn to watch the boats converge on Cai Rang, share tea with a coconut farmer, fall asleep to the sound of river life.",
        price: '980,000',
        stars: 4,
        photo: 'https://images.unsplash.com/photo-1583417319070-4a69db38a482?auto=format&fit=crop&w=2400&q=80',
      },
      {
        name: 'PHU QUOC',
        description: "Vietnam's southernmost island, ringed by white-sand beaches and pepper plantations. Snorkel over technicolor coral at An Thoi, kayak into mangrove rivers, and watch the sunset from a longtail boat with nothing but ocean on the horizon.",
        price: '2,200,000',
        stars: 5,
        photo: 'https://images.unsplash.com/photo-1504457047772-27faf1c00561?auto=format&fit=crop&w=2400&q=80',
      },
    ];

    let activeIdx = 0;
    const bgs = document.querySelectorAll('.hero-bg');
    bgs.forEach((bg, i) => {
      bg.style.backgroundImage = `url('${DESTINATIONS[i].photo}')`;
    });

    function renderCards() {
      const cardsEl = document.getElementById('cards');
      cardsEl.innerHTML = '';
      for (let i = 1; i <= 3; i++) {
        const idx = (activeIdx + i) % DESTINATIONS.length;
        const d = DESTINATIONS[idx];
        const stars = '\u2605'.repeat(d.stars) + '\u2606'.repeat(5 - d.stars);
        const card = document.createElement('div');
        card.className = 'card';
        card.style.backgroundImage = `url('${d.photo}')`;
        card.innerHTML =
          '<div class="card-top">' +
            '<div class="card-name">' + d.name + '</div>' +
            '<div class="card-save" title="Save">\u2661</div>' +
          '</div>' +
          '<div class="card-bottom">' +
            '<div class="card-stars">' + stars + '</div>' +
            '<div class="card-price"><span class="from">from </span>\u20ab' + d.price + '</div>' +
          '</div>';
        card.addEventListener('click', () => setActive(idx));
        cardsEl.appendChild(card);
      }
    }

    function setActive(idx) {
      activeIdx = ((idx % DESTINATIONS.length) + DESTINATIONS.length) % DESTINATIONS.length;
      const d = DESTINATIONS[activeIdx];
      bgs.forEach(bg => bg.classList.remove('active'));
      bgs[activeIdx].classList.add('active');
      document.getElementById('hero-title').textContent = d.name;
      document.getElementById('hero-desc').textContent = d.description;
      const num = String(activeIdx + 1).padStart(2, '0');
      document.getElementById('counter-top').textContent = num + ' / 05';
      document.getElementById('counter-num').textContent = num;
      renderCards();
    }

    document.getElementById('prev-btn').addEventListener('click', () => setActive(activeIdx - 1));
    document.getElementById('next-btn').addEventListener('click', () => setActive(activeIdx + 1));
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') setActive(activeIdx - 1);
      if (e.key === 'ArrowRight') setActive(activeIdx + 1);
    });

    setActive(0);
  </script>
</body>
</html>
